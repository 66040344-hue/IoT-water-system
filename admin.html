<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irrigation IoT - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Fertilizer IoT (Cloud)</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="calculator.html">Calculator</a>
            <a href="admin.html" class="active">Admin</a>
        </div>
    </nav>

    <div class="container">
        <h1>Admin Control Panel</h1>
        <p class="subtitle">ตั้งค่าตัวแปรและกฎการคำนวณ (ข้อมูลจะถูกบันทึกลง Firebase)</p>

        <div class="form-card">
            <h2 style="margin-bottom:1rem; color:var(--primary);">ค่าพื้นฐาน (Base Values)</h2>
            <div class="form-group">
                <label>ค่าน้ำพื้นฐานต่อตารางเมตรทรงพุ่ม (ลิตร)</label>
                <input type="number" id="base_water" step="0.1" value="5">
            </div>
            <div class="form-group">
                <label>ค่าปุ๋ยพื้นฐานต่ออายุ 1 ปี (กรัม)</label>
                <input type="number" id="base_fert" step="10" value="200">
            </div>

            <h2 style="margin-bottom:1rem; margin-top:2rem; color:var(--primary);">ตัวคูณตามระยะการเจริญเติบโต (Stage Multipliers)</h2>
            <div class="form-group">
                <label>ระยะแตกใบอ่อน (Vegetative)</label>
                <input type="number" id="stage_vegetative" step="0.1" value="1.2">
            </div>
            <div class="form-group">
                <label>ระยะออกดอก (Flowering)</label>
                <input type="number" id="stage_flowering" step="0.1" value="1.0">
            </div>
            <div class="form-group">
                <label>ระยะติดผล (Fruiting)</label>
                <input type="number" id="stage_fruiting" step="0.1" value="1.5">
            </div>
            <div class="form-group">
                <label>ระยะหลังเก็บเกี่ยว (Post Harvest)</label>
                <input type="number" id="stage_post_harvest" step="0.1" value="0.8">
            </div>
            
            <button class="btn-submit" onclick="saveRules()">💾 บันทึกกฎลง Database</button>
            <p id="admin-log" style="color:var(--success); margin-top:1rem; text-align:center;"></p>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module" src="firebase_config.js"></script>
    <script type="module">
        import { db, ref, set, get } from './firebase_config.js';

        const rulesRef = ref(db, 'admin_rules');

        // Load existing rules on mount
        async function loadRules() {
            try {
                const snapshot = await get(rulesRef);
                if (snapshot.exists()) {
                    const rules = snapshot.val();
                    document.getElementById('base_water').value = rules.base_water_per_sqm || 5;
                    document.getElementById('base_fert').value = rules.base_fert_per_year || 200;
                    
                    if(rules.stage_multipliers) {
                        document.getElementById('stage_vegetative').value = rules.stage_multipliers.vegetative || 1.2;
                        document.getElementById('stage_flowering').value = rules.stage_multipliers.flowering || 1.0;
                        document.getElementById('stage_fruiting').value = rules.stage_multipliers.fruiting || 1.5;
                        document.getElementById('stage_post_harvest').value = rules.stage_multipliers.post_harvest || 0.8;
                    }
                }
            } catch (error) {
                console.error("Failed to load rules", error);
            }
        }
        loadRules();

        window.saveRules = function() {
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "Saving...";

            const rulesData = {
                base_water_per_sqm: parseFloat(document.getElementById('base_water').value),
                base_fert_per_year: parseFloat(document.getElementById('base_fert').value),
                stage_multipliers: {
                    vegetative: parseFloat(document.getElementById('stage_vegetative').value),
                    flowering: parseFloat(document.getElementById('stage_flowering').value),
                    fruiting: parseFloat(document.getElementById('stage_fruiting').value),
                    post_harvest: parseFloat(document.getElementById('stage_post_harvest').value)
                }
            };

            set(rulesRef, rulesData)
                .then(() => {
                    document.getElementById('admin-log').innerText = "บันทึกข้อมูลเรียบร้อยแล้ว!";
                    setTimeout(() => document.getElementById('admin-log').innerText = "", 3000);
                })
                .catch((error) => {
                    document.getElementById('admin-log').style.color = "var(--danger)";
                    document.getElementById('admin-log').innerText = "เกิดข้อผิดพลาด: " + error.message;
                })
                .finally(() => {
                    btn.innerText = "💾 บันทึกกฎลง Database";
                });
        }
    </script>
</body>
</html>
